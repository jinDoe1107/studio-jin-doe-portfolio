      <stop offset="0%" stop-color="#7b8cde"/>
      <stop offset="100%" stop-color="#b8a9e8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b8cde"/>
      <stop offset="100%" stop-color="#b8a9e8"/>
